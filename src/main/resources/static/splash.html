<!DOCTYPE html>
<html>
<head>
<title>AI Career</title>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family:'Poppins',sans-serif; background:#0a0e1a; color:white;
    min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.shape { position:fixed; border-radius:50%; filter:blur(100px); animation:float 8s ease-in-out infinite; pointer-events:none; }
.s1 { width:400px; height:400px; background:rgba(0,255,200,0.06); top:-100px; right:-100px; }
.s2 { width:300px; height:300px; background:rgba(0,150,255,0.06); bottom:-50px; left:-80px; animation-delay:3s; }
.s3 { width:200px; height:200px; background:rgba(124,58,237,0.06); top:50%; left:30%; animation-delay:5s; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }

.splash-content { text-align:center; z-index:2; position:relative; }

.logo-icon {
    width:90px; height:90px; border-radius:24px;
    background:linear-gradient(135deg,#00ffcc,#00ccff);
    display:flex; align-items:center; justify-content:center;
    font-size:40px; color:#0a0e1a; margin:0 auto 25px;
    animation:pulse 2s ease-in-out infinite;
    box-shadow:0 0 40px rgba(0,255,200,0.3);
}
@keyframes pulse {
    0%,100%{box-shadow:0 0 40px rgba(0,255,200,0.3)}
    50%{box-shadow:0 0 70px rgba(0,255,200,0.5)}
}
.logo-text {
    font-size:2.2rem; font-weight:800; margin-bottom:8px;
    background:linear-gradient(90deg,#00ffcc,#00ccff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.logo-sub { color:#555; font-size:14px; margin-bottom:50px; }

.progress-wrap {
    width:280px; height:4px; background:rgba(255,255,255,0.06);
    border-radius:2px; margin:0 auto 20px; overflow:hidden;
}
.progress-fill {
    height:100%; width:0%; border-radius:2px;
    background:linear-gradient(90deg,#00ffcc,#00ccff);
    animation:load 2.5s ease forwards;
}
@keyframes load { 0%{width:0%} 100%{width:100%} }

.loading-text { color:#444; font-size:13px; animation:blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:1} }

.dots { display:inline-flex; gap:4px; margin-left:4px; }
.dot {
    width:5px; height:5px; border-radius:50%; background:#00ffcc;
    animation:dotBounce 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay:0.2s; }
.dot:nth-child(3) { animation-delay:0.4s; }
@keyframes dotBounce {
    0%,100%{transform:translateY(0);opacity:0.3}
    50%{transform:translateY(-6px);opacity:1}
}

.founder-tag {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
    border-radius:30px; padding:10px 20px; font-size:12px; color:#555; white-space:nowrap;
}
.founder-avatar-sm {
    width:28px; height:28px; border-radius:50%;
    background:linear-gradient(135deg,#00ffcc,#7c3aed);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:white; flex-shrink:0;
}
</style>
</head>
<body>
<div class="shape s1"></div>
<div class="shape s2"></div>
<div class="shape s3"></div>

<div class="splash-content">
    <div class="logo-icon"><i class="fas fa-robot"></i></div>
    <div class="logo-text">AI Career</div>
    <div class="logo-sub">Resume Intelligence Platform</div>
    <div class="progress-wrap"><div class="progress-fill"></div></div>
    <div class="loading-text">
        Loading
        <span class="dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </span>
    </div>
</div>

<div class="founder-tag">
    <div class="founder-avatar-sm">SP</div>
    Built by <strong style="color:#e0e0e0;">Saurabh Pal</strong> · March 2026
</div>

<script>
setTimeout(() => {
    const token = localStorage.getItem("token");
    if (token && token !== "null" && token !== "undefined" && token.trim() !== "") {
        window.location.replace("dashboard.html");
    } else {
        window.location.replace("login.html");
    }
}, 2800);
</script>
</body>
</html>
